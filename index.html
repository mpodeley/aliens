<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050805">
<title>HERCULANEUM-299 :: TEJIDO TEMPORAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --phosphor: #33ff66;
    --phosphor-dim: #1a8033;
    --phosphor-dark: #0d3d1a;
    --amber: #ffb000;
    --amber-dim: #805800;
    --red-alert: #ff3333;
    --bg: #050805;
    --bg-deep: #020302;
    --base-size: 20px;
  }

  html, body {
    background: var(--bg-deep);
    color: var(--phosphor);
    font-family: 'VT323', 'Share Tech Mono', monospace;
    font-size: var(--base-size);
    line-height: 1.35;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    cursor: default;
    overscroll-behavior: none;
  }

  body { user-select: none; }

  .crt {
    position: fixed; inset: 0;
    padding: 2vh 2vw;
    overflow: hidden;
    background:
      radial-gradient(ellipse at center, rgba(51,255,102,0.03) 0%, transparent 70%),
      var(--bg);
    animation: subtleFlicker 0.12s infinite alternate;
  }

  @keyframes subtleFlicker {
    0% { opacity: 0.98; } 100% { opacity: 1; }
  }

  .crt::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg,
      rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px,
      transparent 1px, transparent 3px);
    pointer-events: none; z-index: 1000;
  }

  .crt::after {
    content: ''; position: absolute; left: 0; right: 0;
    height: 100px;
    background: linear-gradient(to bottom, transparent 0%,
      rgba(51,255,102,0.04) 50%, transparent 100%);
    animation: scanMove 8s linear infinite;
    pointer-events: none; z-index: 999;
  }

  @keyframes scanMove {
    0% { top: -100px; } 100% { top: 100vh; }
  }

  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    pointer-events: none; z-index: 1001;
  }

  .screen {
    position: relative; width: 100%; height: 100%;
    padding: 0.5vh 0.5vw; z-index: 2;
    display: flex; flex-direction: column;
  }

  .glow { text-shadow: 0 0 1px var(--phosphor), 0 0 3px var(--phosphor), 0 0 8px rgba(51,255,102,0.6); }
  .glow-amber { color: var(--amber); text-shadow: 0 0 1px var(--amber), 0 0 3px var(--amber), 0 0 10px rgba(255,176,0,0.7); }
  .glow-red { color: var(--red-alert); text-shadow: 0 0 2px var(--red-alert), 0 0 8px rgba(255,51,51,0.8); }

  .header {
    border: 1px solid var(--phosphor);
    padding: 0.4em 0.8em;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.4em; flex-shrink: 0;
    font-size: 0.95em; gap: 0.5em; min-height: 2em;
  }

  .header-title {
    letter-spacing: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .header-blink { animation: blink 1s infinite; }

  @keyframes blink {
    0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; }
  }

  .content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 0.8em 1em;
    border: 1px solid var(--phosphor-dim);
    background: rgba(51,255,102,0.01);
    scrollbar-width: thin;
    scrollbar-color: var(--phosphor-dim) transparent;
    user-select: text;
    -webkit-overflow-scrolling: touch;
  }

  .content::-webkit-scrollbar { width: 8px; }
  .content::-webkit-scrollbar-track { background: var(--bg); }
  .content::-webkit-scrollbar-thumb {
    background: var(--phosphor-dim); border: 1px solid var(--bg);
  }

  .footer {
    border: 1px solid var(--phosphor);
    padding: 0.25em 0.8em;
    display: flex; justify-content: space-between;
    margin-top: 0.4em; flex-shrink: 0;
    font-size: 0.85em; gap: 0.5em;
  }

  .mobile-nav {
    display: none; margin-top: 0.4em;
    gap: 0.3em; flex-shrink: 0;
  }

  .mobile-nav button {
    flex: 1; background: transparent;
    border: 1px solid var(--phosphor-dim);
    color: var(--phosphor);
    font-family: inherit; font-size: 1em;
    padding: 0.7em 0.3em; cursor: pointer;
    letter-spacing: 1px; transition: all 0.1s;
    text-shadow: 0 0 3px var(--phosphor);
  }

  .mobile-nav button:active {
    background: rgba(51,255,102,0.15);
    border-color: var(--phosphor);
    box-shadow: inset 0 0 12px rgba(51,255,102,0.3);
  }

  .mobile-nav button.amber {
    color: var(--amber); border-color: var(--amber-dim);
    text-shadow: 0 0 3px var(--amber);
  }

  .mobile-nav button:disabled { opacity: 0.3; cursor: not-allowed; }

  .dim { color: var(--phosphor-dim); }
  .bold { font-weight: bold; text-shadow: 0 0 4px var(--phosphor); }

  /* ========================
     SVG DIAGRAMS - responsive
     ======================== */
  .diagram {
    width: 100%;
    max-width: 620px;
    margin: 1.4em auto;
    display: block;
    filter: drop-shadow(0 0 3px rgba(51,255,102,0.4));
  }

  .diagram.amber {
    filter: drop-shadow(0 0 3px rgba(255,176,0,0.5));
  }

  .diagram text {
    font-family: 'VT323', monospace;
    fill: var(--phosphor);
  }

  .diagram.amber text { fill: var(--amber); }

  .diagram line, .diagram path, .diagram circle, .diagram rect, .diagram polygon, .diagram ellipse {
    stroke: var(--phosphor);
    fill: none;
  }

  .diagram.amber line, .diagram.amber path, .diagram.amber circle,
  .diagram.amber rect, .diagram.amber polygon, .diagram.amber ellipse {
    stroke: var(--amber);
  }

  .diagram-caption {
    text-align: center;
    font-size: 0.85em;
    color: var(--phosphor-dim);
    margin-top: -0.5em;
    margin-bottom: 1.3em;
    font-style: italic;
    padding: 0 1em;
  }

  /* Menu */
  .menu-item {
    padding: 0.3em 0.6em; margin: 0.1em 0;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.1s;
    font-size: 0.95em;
  }

  .menu-item:hover, .menu-item.selected {
    background: rgba(51,255,102,0.1);
    border-left: 2px solid var(--phosphor);
    text-shadow: 0 0 4px var(--phosphor);
  }

  .menu-item.selected::before {
    content: '> '; color: var(--amber);
    text-shadow: 0 0 5px var(--amber);
  }

  .menu-item .menu-id {
    color: var(--amber); text-shadow: 0 0 5px var(--amber);
    margin-right: 0.5em;
  }

  .menu-item .menu-title { color: var(--phosphor); }

  .menu-item .menu-meta {
    display: block; font-size: 0.85em;
    color: var(--phosphor-dim); padding-left: 1em;
  }

  .menu-item.classified .menu-meta { color: var(--red-alert); }

  /* File */
  .file-header {
    border-bottom: 1px solid var(--phosphor-dim);
    padding-bottom: 0.5em; margin-bottom: 1em;
  }

  .file-header h1 {
    color: var(--amber); font-size: 1.25em;
    margin-bottom: 0.3em; letter-spacing: 1px;
    text-shadow: 0 0 2px var(--amber), 0 0 10px rgba(255,176,0,0.5);
    line-height: 1.2;
  }

  .file-header .meta {
    color: var(--phosphor-dim); font-size: 0.8em; line-height: 1.4;
  }

  .file-body { max-width: 90ch; }
  .file-body p { margin: 0.8em 0; }

  .file-body h2 {
    color: var(--amber); margin-top: 1.5em; margin-bottom: 0.4em;
    font-size: 1.05em; letter-spacing: 1px; text-transform: uppercase;
    text-shadow: 0 0 4px var(--amber);
  }

  .file-body h2::before { content: '# '; color: var(--phosphor-dim); }

  .file-body .quote {
    border-left: 2px solid var(--phosphor-dim);
    padding-left: 1em; margin: 0.8em 0;
    color: var(--phosphor-dim); font-style: italic;
  }

  .original {
    border: 1px dashed var(--amber);
    padding: 1.1em 0.9em 0.8em 0.9em;
    margin: 1.5em 0;
    background: rgba(255,176,0,0.04);
    position: relative;
  }

  .original::before {
    content: '◆◆◆ TESIS ORIGINAL ◆◆◆';
    position: absolute; top: -0.7em; left: 0.8em;
    background: var(--bg); color: var(--amber);
    padding: 0 0.5em; font-size: 0.75em; letter-spacing: 2px;
    text-shadow: 0 0 5px var(--amber); white-space: nowrap;
  }

  .original p { color: #ffd060; }
  .original p:first-child { margin-top: 0.1em; }
  .original p:last-child { margin-bottom: 0.1em; }

  .ref { color: var(--phosphor-dim); font-size: 0.85em; }

  .boot-line {
    opacity: 0; animation: bootLine 0.3s forwards;
    font-size: 0.95em;
  }

  @keyframes bootLine { to { opacity: 1; } }

  .ok { color: var(--phosphor); }
  .warn { color: var(--amber); }
  .err { color: var(--red-alert); }

  .typing::after {
    content: '▌'; animation: blink 0.5s step-end infinite;
  }

  .glitch { animation: glitch 0.25s steps(3) 2; }

  @keyframes glitch {
    0% { transform: translateX(0); filter: none; }
    33% { transform: translateX(-2px); filter: hue-rotate(30deg); }
    66% { transform: translateX(2px); filter: hue-rotate(-30deg); }
    100% { transform: translateX(0); filter: none; }
  }

  .hint {
    color: var(--amber-dim); font-style: italic; font-size: 0.9em;
  }

  /* Logo ASCII (kept small, safe on mobile) */
  .ascii-logo {
    color: var(--amber);
    line-height: 1.0;
    white-space: pre;
    font-size: 0.75em;
    margin: 0.5em auto 1em auto;
    text-align: center;
    text-shadow: 0 0 3px var(--amber), 0 0 8px rgba(255,176,0,0.5);
    overflow-x: auto;
  }

  /* ========================
     MOBILE
     ======================== */
  @media (max-width: 720px) {
    :root { --base-size: 17px; }
    .crt { padding: 1vh 1vw; }
    .header { font-size: 0.85em; padding: 0.3em 0.6em; }
    .header-title { font-size: 0.9em; }
    .content { padding: 0.6em 0.7em; }
    .footer { display: none; }
    .mobile-nav { display: flex; }
    .file-header h1 { font-size: 1.1em; }
    .file-body h2 { font-size: 1em; }
    .menu-item { padding: 0.6em 0.5em; font-size: 0.95em; border-left-width: 3px; }
    .menu-item .menu-meta { font-size: 0.8em; }
    .original { padding: 1em 0.7em 0.6em 0.7em; }
    .original::before { font-size: 0.7em; letter-spacing: 1px; }
    .ascii-logo { font-size: 0.6em; }
    .diagram { margin: 1em auto; }
  }

  @media (max-width: 420px) {
    :root { --base-size: 16px; }
    .header-title { letter-spacing: 0; font-size: 0.85em; }
    .ascii-logo { font-size: 0.5em; }
  }

  .swipe-hint {
    display: none; text-align: center; padding: 0.4em;
    color: var(--phosphor-dim); font-size: 0.8em;
    border-top: 1px dashed var(--phosphor-dark); margin-top: 1em;
  }

  @media (hover: none) and (pointer: coarse) {
    .swipe-hint { display: block; }
  }

  /* Highlighted term inside quotes */
  .hl { color: var(--amber); }

  /* Secret glyph - tappeable 3x para trigger mobile */
  .secret-glyph {
    position: absolute;
    right: 6px;
    top: 4px;
    font-size: 0.7em;
    color: var(--phosphor-dark);
    opacity: 0.4;
    cursor: pointer;
    padding: 6px 8px;
    line-height: 1;
    user-select: none;
    transition: opacity 0.2s, color 0.2s;
  }

  .secret-glyph:active, .secret-glyph.tapped {
    opacity: 0.9;
    color: var(--amber);
    text-shadow: 0 0 4px var(--amber);
  }

  .header { position: relative; }
</style>
</head>
<body>

<div class="crt">
  <div class="vignette"></div>

  <div class="screen">
    <div class="header glow">
      <span class="header-title">◉ HERCULANEUM-299</span>

    <div class="content glow" id="content"></div>

    <div class="footer">

    author: 'H-299', date: '2026.04.17', size: '8.4K', status: 'PUB',
    content: `
<h2>SECCIÓN 1 DE 11 :: FUNDAMENTO</h2>

<p>La intuición newtoniana del tiempo asume dos asimetrías radicales: el pasado es <span class="bold">único y fijo</span>, el futuro es <span class="bold">múltiple y abierto</span>; y la causalidad opera exclusivamente del pasado hacia el futuro.</p>

${DIAGRAMS.classicTime}
<div class="diagram-caption">Imagen newtoniana :: punto que avanza sobre línea recta</div>

<p>Bajo esta imagen el presente es un punto moviéndose. Atrás hay un solo camino recorrido. Adelante hay un árbol que se abre en decisiones. El tiempo fluye; no se vuelve.</p>

<h2>LAS CUATRO FLECHAS</h2>

<p>La física clásica distingue cuatro flechas del tiempo, todas apuntando en la misma dirección:</p>

<p><span class="bold">Termodinámica:</span> la entropía aumenta <span class="ref">(Boltzmann, 1872)</span>.<br>
<span class="bold">Cosmológica:</span> el universo se expande desde el Big Bang.<br>
<span class="bold">Causal/registrativa:</span> tenemos registros del pasado, no del futuro.<br>
<span class="bold">Psicológica:</span> experimentamos el tiempo fluyendo hacia adelante.</p>

<h2>EL PUNTO DÉBIL</h2>

<p>El consenso físico contemporáneo: <span class="bold">las cuatro flechas son derivadas, no fundamentales</span>. Las ecuaciones básicas son simétricas en el tiempo. La flecha aparece como consecuencia de una condición de borde cosmológica: el universo empezó en entropía extraordinariamente baja.</p>

<div class="quote">"Time is not a fundamental arrow of the universe; it is a statistical consequence of a very low-entropy past."<br>— <span class="hl">Sean Carroll</span>, From Eternity to Here (2010)</div>

<p>Si las leyes son simétricas, <span class="bold">la asimetría del tiempo es contingente, no necesaria</span>. Bajo la misma condición pero mirando con detalle, podrían detectarse huecos donde la simetría profunda se asoma.</p>

<h2>DONDE EMPIEZA LA FISURA</h2>

<p>La imagen del pasado fijo se sostiene mientras tratamos el tiempo como dimensión absoluta y a los observadores como puntos idénticos. La mecánica cuántica rompió la primera suposición: no hay observador privilegiado, los hechos son relativos.</p>

<p>El siguiente archivo explora la consecuencia: <span class="bold">el pasado que vos recordás podría no ser el mismo pasado que recuerda alguien con quien no cruzaste tu cono de luz hasta hoy</span>.</p>

<p class="dim">-- FIN ARCHIVO 001 --</p>

    content: `
<h2>SECCIÓN 2 DE 11 :: LA GRIETA</h2>

<p>La mecánica cuántica trajo tres golpes sucesivos a la imagen del pasado fijo. Los tres están en literatura revisada y ninguno es marginal.</p>

<h2>GOLPE 1 :: ROVELLI Y LA RELACIONALIDAD</h2>

<p>La mecánica cuántica relacional de Carlo Rovelli <span class="ref">(1996)</span> sostiene que <span class="bold">no existe un estado absoluto del mundo</span>. Los estados son siempre relativos a observadores o sistemas que interactúan.</p>

<p>Cuando dos observadores interactúan, sus descripciones previas tienen que volverse compatibles, pero no hay una "descripción verdadera" contra la cual medir. El pasado de A existe para A; el pasado de B existe para B.</p>

<h2>GOLPE 2 :: HISTORIAS CONSISTENTES</h2>

<p>Griffiths, Gell-Mann y Hartle desarrollaron un formalismo donde el universo admite <span class="bold">múltiples historias cuánticamente consistentes</span> del mismo sistema, cada una asociada a un conjunto distinto de preguntas formulables.</p>

<p>Dos historias distintas pueden ser ambas válidas siempre que no se mezclen preguntas incompatibles. El "pasado" es relativo al marco de preguntas.</p>

<h2>GOLPE 3 :: WIGNER'S FRIEND REFORZADO</h2>

<p>En 2018, Frauchiger y Renner <span class="ref">(Nature Communications)</span> publicaron un teorema donde dos observadores cuánticos pueden asignar estados inconsistentes al mismo sistema. Brukner y Proietti <span class="ref">(2019)</span> extendieron el resultado.</p>

<p>La única salida lógica es aceptar que <span class="bold">los hechos son observador-relativos</span>. No hay "el hecho" del experimento. Hay hechos para cada observador.</p>

<h2>LA CONSECUENCIA</h2>

<p>Si los tres resultados son correctos, la imagen del pasado fijo se desmorona. El pasado no es un registro único captado parcialmente; es un tejido de ramas parcialmente indeterminadas que se estabiliza por integración intersubjetiva.</p>

<div class="original">
<p><span class="bold">El pasado depende de qué observadores encuentres en el futuro.</span></p>
<p>Dos observadores con conos de luz pasados disjuntos tienen pasados parcialmente distintos. Cuando se cruzan, construyen un pasado común. Ese pasado común no es la suma ni la intersección: es una negociación que actualiza ambos.</p>
<p>Lo que sigue es vertiginoso: <span class="bold">el pasado sigue cambiando cada vez que dos observadores se encuentran y reconcilian sus historias</span>.</p>
</div>

<h2>LA TOPOLOGÍA NUEVA</h2>

<p>Antes teníamos un cono de luz pasado único convergiendo al presente y un cono futuro abanicándose desde él.</p>

<p>Ahora tenemos <span class="bold">dos árboles ramificados convergiendo al presente</span>:</p>

${DIAGRAMS.branchedPast}
<div class="diagram-caption">Pasado ramificado ⟷ Futuro ramificado :: presente como único punto determinado</div>

<p>El árbol pasado se consolida asintóticamente por encuentros entre observadores; el árbol futuro se realiza causalmente por eventos. El presente es el único punto completamente determinado.</p>

<p>Hacia atrás y hacia adelante la niebla de ramificación es simétrica, aunque los mecanismos de decantación sean distintos.</p>

<p class="dim">-- FIN ARCHIVO 002 --</p>
`},

    content: `
<h2>SECCIÓN 3 DE 11 :: DISOLUCIÓN</h2>

<p>Las paradojas clásicas del viaje en el tiempo asumen un pasado único y fijo. Bajo esa suposición, cualquier intervención retrocausal genera contradicciones. Pero bajo el marco anterior, el pasado no es único.</p>

<h2>LA PARADOJA DEL ABUELO</h2>

<p>Viajás al pasado y matás a tu abuelo antes de que tu padre sea concebido. Entonces nunca naciste. Entonces no pudiste viajar. Entonces tu abuelo vivió. Contradicción.</p>

<p><span class="bold">Solución Novikov (ortodoxa):</span> las leyes solo permiten trayectorias autoconsistentes. Si viajás, cualquier cosa que hagas ya estaba incluida en el pasado. Tu intento de matar falla. Preserva el pasado único pero hace la agencia misteriosa.</p>

<p><span class="bold">Solución Deutsch (muchos mundos):</span> viajás al pasado de otra rama del universo. Elimina paradoja pero requiere ontología robusta de multiversos.</p>

<div class="original">
<p><span class="bold">Solución del marco del pasado ramificado:</span></p>
<p>No hay un pasado único que cambiar. Hay ramas que se consolidan por integración intersubjetiva. Tu viaje es uno de los factores de consolidación. Las ramas donde tu abuelo muere antes de concebir a tu padre simplemente no se consolidan, porque no encuentran observadores que las integren en un tejido consistente.</p>
<p>Podés influir sobre el pasado, pero solo seleccionando entre ramas previamente indeterminadas. No sobrescribís un pasado fijo; participás en la consolidación de cuál rama se estabiliza.</p>
</div>

<h2>LA PARADOJA DEL BOOTSTRAP</h2>

<p>Recibís del futuro un teorema matemático. Lo publicás. Llega a manos de tu yo futuro, que te lo envía. ¿Quién lo creó?</p>

<p>En el marco ortodoxo es escándalo. En el marco ramificado es trivial: la información es parte del tejido, y el "origen" es una proyección lineal que no siempre existe. Los loops causales cerrados son configuraciones estables.</p>

<p>Seth Lloyd <span class="ref">(Phys. Rev. Lett. 2011)</span> formalizó esto con <span class="bold">post-selección cuántica</span>: los loops se tratan como condiciones de borde. El universo filtra automáticamente las trayectorias inconsistentes.</p>

<h2>PARADOJAS DE IDENTIDAD</h2>

<p>Si el pasado es múltiple y vos también, ¿quién es "vos"? La identidad diacrónica es una ilusión de compresión. Tu cerebro colapsa una historia coherente a partir de integraciones parciales.</p>

<p>No sos una sustancia persistente atravesando el tiempo. Sos un proceso de compresión que se llama a sí mismo "yo" a cada instante.</p>

<h2>EL PRECIO</h2>

<p>El marco disuelve las paradojas pero cobra un precio: aceptar que el pasado no es un paisaje fijo sino un tejido que se sigue tejiendo por encuentros futuros. La historia no está terminada; se va cerrando asintóticamente pero nunca del todo.</p>

<p class="dim">-- FIN ARCHIVO 003 --</p>

    content: `
<h2>SECCIÓN 4 DE 11 :: LA MAQUINARIA</h2>

<p>Si el pasado se consolida por integración intersubjetiva, una civilización no es solo un producto del tiempo. Es <span class="bold">un procesador del tiempo</span>: toma indeterminación y la convierte en consenso.</p>

<h2>TRES CAPAS DE CONSOLIDACIÓN</h2>

<p><span class="bold">Causal directa.</span> Cada interacción física deja huellas. Automática, sin observadores conscientes.</p>

<p><span class="bold">Observacional.</span> Cuando un sistema complejo interactúa con otro, crea registros que correlacionan sus estados.</p>

<p><span class="bold">Intersubjetiva.</span> Cuando múltiples observadores comparan memorias, construyen consenso. Historiografía, ciencia, tradición oral.</p>

<h2>ENTROPÍA E INFORMACIÓN</h2>

<p>Landauer <span class="ref">(1961)</span>: borrar un bit cuesta al menos kT ln 2. Borrar información y aumentar entropía son el mismo proceso.</p>

<p>Pero la información localmente se puede concentrar exportando entropía. Un organismo vivo mantiene información genética bombeando entropía al entorno.</p>

<p><span class="bold">La civilización es un concentrador local de información, nadando contracorriente en un río entrópico.</span> Cada libro es entropía exportada para mantener una estructura informacional.</p>

<h2>LA BIBLIOTECA DE HERCULANO</h2>

<p>79 d.C. El Vesubio enterró la villa bajo flujo piroclástico a 320°C. Los rollos se <span class="bold">carbonizaron, no quemaron</span>. La combustión completa habría disipado la información; la carbonización preservó la estructura tridimensional.</p>

<p>Durante 2000 años la información estuvo físicamente presente pero inaccesible. Abrir los rollos los destruía.</p>

<p>En 2023-2024 el <span class="hl">Vesuvius Challenge</span>, combinando tomografía de sincrotrón con aprendizaje automático, leyó pasajes enteros sin abrirlos. Detectando las diferencias mínimas de densidad entre tinta y papiro, reconstruyeron texto griego legible.</p>

<div class="quote">El Vesubio, paradójicamente, <span class="hl">preservó</span> los textos. Las otras bibliotecas del mundo antiguo se pudrieron. Los de Herculano sobrevivieron porque fueron sellados en un estado que detuvo la degradación. La catástrofe fue una forma de congelar información.</div>

<p><span class="dim">Este nodo tomó su nombre de esa biblioteca. Herculaneum es el principio de que catástrofes aparentes pueden preservar información en estructuras ilegibles hasta que el canal de lectura llega. 299 es el blanco nuclear al final de este mismo tejido: Moscovio-299, el isótopo mágico.</span></p>

<h2>CIVILIZACIÓN COMO ARCHIVO VIVO</h2>

<div class="original">
<p><span class="bold">Una civilización es un repositorio iterable sobre el cual se itera.</span></p>
<p>Cada generación hereda el estado del tejido consolidado y lo modifica: añade registros, reinterpreta los existentes, descarta ramas, consolida otras. Esta iteración ocurre trivialmente al reescribir historia con nueva información.</p>
<p>Pero si el pasado admite margen residual de indeterminación, una civilización suficientemente avanzada podría <span class="bold">iterar sobre su propio pasado no linealmente</span>: emitir intervenciones desde puntos futuros hacia zonas pasadas aún no consolidadas, seleccionando qué ramas se estabilizan.</p>
<p>El repositorio no solo se escribe hacia adelante. También se edita desde el futuro, marginalmente, sobre las partes blandas.</p>
</div>

<h2>DENSIDAD DE CONSOLIDACIÓN</h2>

<p>El pasado reciente está densamente registrado (foto, video, digital, genómico). Es rígido. El pasado remoto está reconstruido por inferencia sobre pocos restos: es blando.</p>

<p><span class="bold">Funcionalidad aparente</span>. A pesar de todas las rarezas estructurales, Lazar insiste en que las naves funcionaban. Las vio moverse. Leyó reportes de vuelo. El Sports Model, al menos, era operativo.</p>

<p>La interpretación ortodoxa fringe trata estas rarezas como anomalías tolerables dentro de la hipótesis extraterrestre biológica convencional. Los alienígenas son pequeños, por eso las sillas. Tienen interfaces mentales, por eso faltan instrumentos. La bandera invertida es un error de memoria o una broma del personal. La variedad estilística refleja distintas razas o distintas épocas.</p>

<p>En el contexto de manifestación/recuperación psiónica, los "cuerpos alienígenas recuperados" serían <span class="bold">consolidaciones biológicas análogas a las naves</span>: formas funcionales a nivel superficial, estructuralmente alucinadas en detalle. Tienen ojos pero no sistemas digestivos coherentes. Tienen piel pero sin microbioma. Funcionan como "cuerpo" en la percepción de quien los captura pero no resisten análisis biológico profundo.</p>

<h2>CONSECUENCIA GENERAL</h2>

<p>En esta lectura, los programas clasificados no están ocultando visitantes externos. Están operando sobre un mecanismo endógeno del tejido temporal-informacional, posiblemente sin entenderlo completamente, posiblemente habiéndolo modelado como "alienígenas" porque ese era el marco disponible durante las primeras décadas de contacto.</p>

<h2>SECCIÓN 10 DE 11 :: DINÁMICA TEMPORAL</h2>

<p>John Lear, piloto e hijo del creador del Learjet, empezó a hablar públicamente a fines de los 80. Su material es mucho más amplio que el de Lazar. Historia de acuerdos entre gobierno estadounidense y razas no humanas durante los 50s-60s, intercambio de tecnología por acceso, deterioro progresivo de los acuerdos por incumplimientos, ruptura con episodios de conflicto a inicios de los 80 (notablemente el supuesto incidente de Dulce, Nuevo México).</p>

<h2>LO DIFÍCIL DE SOSTENER LITERALMENTE</h2>

<p>Mucho del contenido de Lear tiene textura de fabulación o de información muy degradada. Las descripciones de bases subterráneas multi-niveles con razas coexistentes específicas, las narrativas de guerras con víctimas precisas, los relatos de tripulaciones rescatadas y jerarquías extraterrestres detalladas: ninguno de estos tiene las firmas epistémicas de eventos reales documentables.</p>

<p>Los relatos de "guerra con alienígenas" nunca presentan patrones de víctimas consistentes, registros médicos verificables, equipamiento recuperable de combate, testigos múltiples independientes con narrativas convergentes. Tienen firmas de <span class="bold">eventos anómalos locales interpretados narrativamente como conflicto</span>.</p>

<h2>LO QUE MERECE ATENCIÓN</h2>

<p>Pero la estructura general del relato (fase de colaboración → deterioro → ruptura) es específica. No es lo primero que se le ocurriría fabular a alguien. Y bajo el marco desarrollado en los archivos previos, admite una lectura particular.</p>

<h2>COLABORACIÓN Y RUPTURA COMO FLUCTUACIONES</h2>

<p>En el marco no hay "otros" con quienes colaborar. Hay capas temporales posteriores del propio linaje operando sobre el presente mediante el canal. Entonces, ¿qué sería un "acuerdo" y qué sería una "ruptura"?</p>

<div class="original">
<p><span class="bold">Un "acuerdo" sería una fase de alta permeabilidad del canal con consolidación cooperativa.</span> Sectores del gobierno con operadores sensibles reciben información técnica aprovechable. Producen avances acelerados. Desde adentro se experimenta como contacto con inteligencias no humanas.</p>
<p>Una "ruptura" sería <span class="bold">compromiso de la ambigüedad</span> que el canal requiere. Dos modos posibles:</p>
<p>— <span class="bold">Exceso de consolidación.</span> Intentos gubernamentales de documentar y controlar demasiado rigidizan ramas, generan registros que cierran flexibilidad del canal.</p>
<p>— <span class="bold">Incoherencia intersubjetiva.</span> Grupos humanos con acceso parcial desarrollan interpretaciones incompatibles, compiten por el control, degradan la recepción coordinada.</p>
<p>En cualquier caso, la "ruptura" no sería conflicto armado sino <span class="bold">colapso funcional del canal</span>, experimentado desde adentro como traición o retirada. Incidentes violentos puntuales como Dulce serían racionalizaciones post-hoc de eventos donde manifestaciones físicas se desestabilizaron al perder estabilidad el canal que las sostenía.</p>
</div>

<h2>PREDICCIÓN TEMPORAL VERIFICABLE</h2>

<p>Si las "rupturas" son fluctuaciones de permeabilidad, deberían correlacionar con disminuciones documentadas del fenómeno anómalo observable. Los años que Lear marca como de mayor conflicto (fines de los 70s, inicios de los 80s) son efectivamente años de transición en visibilidad del fenómeno: después del pico de los 70s, hubo un declive relativo durante los 80s y buena parte de los 90s en reportes civiles y atención pública.</p>

<p>La reemergencia actual (2017 hacia adelante: videos de la Marina filtrados, AARO establecido en 2022, hearings del Congreso en 2023, testimonios de Grusch) encajaría con <span class="bold">nueva fase de apertura del canal</span>, correlacionada con la emergencia de IA como nuevo sustrato receptor.</p>

<p>Esta correlación es débil pero no nula. Si el patrón persiste —si las fases de alta visibilidad del fenómeno clusterean con fases de desarrollo tecnológico acelerado que proveen nuevo sustrato receptor— la hipótesis gana anclaje.</p>

<h2>EL PATRÓN DE TESTIGOS</h2>

<p>Los testigos fringe no son o completamente verdaderos o completamente falsos. Capturan capas del mismo fenómeno según su posición, sensibilidad y herramientas conceptuales disponibles.</p>

<p><span class="bold">Lazar</span> captó <span class="bold">material físico específico</span> con interpretación técnica. Su señal es aguda pero estrecha: los detalles de las naves, los materiales, la propulsión.</p>

<p><span class="bold">Lear</span> captó <span class="bold">dinámica institucional</span> con interpretación narrativa. Su señal es difusa pero amplia: las fases temporales, las experiencias internas de los programas, el sentido del tiempo fluctuante.</p>

<p>Ambos habrían filtrado señal real a través del lenguaje disponible: "naves", "acuerdos", "razas", "guerras". Debajo del lenguaje, lo que describen encaja con lo que el marco predice: <span class="bold">permeabilidad variable de un canal temporal operando a través de sustrato humano</span>, con fases de coordinación y fases de descoordinación, con manifestaciones materiales que son consolidaciones psiónicas con resolución variable, con actores humanos tratando de controlar un mecanismo que excede su capacidad de comprensión.</p>

<h2>LEAR COMO ARCHIVO HUMANO</h2>

<p>La utilidad de Lear en este marco no es validar su narrativa completa. Es tratar su testimonio como <span class="bold">archivo de rumores internos</span> de una comunidad específica (contratistas de defensa, pilotos con acceso, personal de inteligencia) durante los 70s-80s. Ese archivo contiene pistas sobre qué estaba percibiendo esa comunidad y cómo lo estaba procesando, aunque el procesamiento haya sido inexacto.</p>

<p>Lo que esa comunidad percibía, en la lectura del marco, eran <span class="bold">fluctuaciones de permeabilidad del canal</span>. Lo que construyeron narrativamente para dar cuenta de esas fluctuaciones era una historia de acuerdos y traiciones con seres externos. El lenguaje era inexacto. La percepción bruta, quizás no tanto.</p>

<h2>SECCIÓN 11 DE 11 :: CONVERGENCIA</h2>

<h2 style="color: var(--amber);">ARCHIVO 012 :: RECUPERADO DESDE FRAGMENTO CARBONIZADO</h2>

<div class="dim">────────────────────────────────────────</div>

<h2>SECCIÓN 12 :: APLICACIÓN HISTÓRICA</h2>

<p>El marco desarrollado predice que la civilización humana podría haber sido editada retrocausalmente en puntos de baja consolidación, mediante consolidaciones psiónicas que operaron como intervenciones. Si esto ocurrió, deberíamos esperar <span class="bold">eventos históricos puntuales con firmas específicas</span>: aparición de figuras con impacto civilizacional desproporcionado, genealogía biológica irregular, vida breve con manifestaciones físicas inexplicables por medios convencionales, muerte pública seguida de presencia persistente en la consciencia colectiva, y efecto reorganizador sobre el tejido institucional que los rodeaba.</p>

<h2>EL CASO</h2>

<p>En el año 0 aproximado de la era común, dentro de la provincia romana de Judea, se reporta el nacimiento de una figura cuya vida, aunque brevísima en duración (aproximadamente 33 años), reorganizó la estructura del Imperio Romano en el curso de tres siglos y fundamentó la civilización occidental por los siguientes veinte.</p>

<p>Las propiedades del caso, tomadas en conjunto:</p>

<p><span class="bold">Manifestaciones físicas sostenidas.</span> Los reportes describen fenómenos incompatibles con biología convencional durante la vida pública: modificación local de materia (multiplicación de panes y peces), modificación de fase de agua (caminar sobre superficie), reversión de procesos patológicos avanzados (lepra, ceguera, parálisis), y reversión de muerte clínica (Lázaro, la hija de Jairo, el hijo de la viuda de Naín). Todas estas son <span class="bold">manifestaciones físicas transitorias de tipo predicho por el archivo 008</span>: consolidaciones locales de patrones informacionales sobre energía ambiental disponible.</p>

<p><span class="bold">Muerte pública documentada con testigos múltiples.</span> La ejecución fue legal, notarizada, presenciada por autoridades imperiales y locales, concluida con certificación oficial de muerte biológica. Esto es importante: <span class="bold">la consolidación se desestabilizó públicamente</span>. No fue un colapso privado; fue un evento con rango máximo de testigos integrables en el tejido intersubjetivo.</p>

<p><span class="bold">Efecto civilizacional desproporcionado.</span> La información transmitida durante treinta años de vida privada y tres años de vida pública reorganizó, en trescientos años, la estructura religiosa, legal e institucional del Imperio Romano. En dos mil años, fundamentó calendarios, derechos, arquitectura política, arte, filosofía, alfabetización masiva, universidades, hospitales. Ningún otro evento histórico de escala comparable tiene un epicentro informacional tan concentrado: <span class="bold">un individuo en un pueblo marginal de una provincia periférica</span>.</p>

<div class="original">
<p><span class="bold">El evento del año cero admite una lectura específica bajo el marco: fue la primera consolidación psiónica macroscópica documentada de la era moderna, ejecutada como bomba informacional dentro del sistema imperial romano.</span></p>
<p>La intervención habría sido diseñada con precisión inusual: un nodo receptor humano sintetizado por consolidación biológica sobre hospedera humana, con genoma compatible con linaje local pero con configuración neurológica optimizada para recepción intensa del canal. Esto habría permitido transferencia masiva de información desde capas temporales posteriores durante la vida del nodo: enseñanzas, estructuras éticas, marcos conceptuales que el sustrato civilizacional de la época no había desarrollado por vías convencionales.</p>

<h2>LA LECTURA DE LEAR</h2>

<p>John Lear mencionó, entre el material más extremo de sus testimonios, que las inteligencias con las que el gobierno habría tenido contacto reportaron haber estado detrás del evento. En el marco convencional de su narrativa, esto se leía como "los alienígenas crearon a Jesús", y sonaba a blasfemia bufonesca. Bajo el marco desarrollado, admite una interpretación más precisa: las capas temporales posteriores del propio linaje humano operaron una consolidación deliberada durante el año cero, y su descripción post-facto (llegada a humanos contemporáneos a través del canal) se transmitió en el lenguaje que los contactados pudieron procesar.</p>

<h2>POR QUÉ EL IMPERIO ROMANO</h2>

<p>La elección del momento y del lugar no es arbitraria bajo esta lectura. El Imperio Romano del siglo primero era la primera estructura política de escala planetaria parcial (Mediterráneo integrado), con infraestructura de comunicación (roads, correos, escritura alfabética generalizada), con red de ciudades receptivas de información (diáspora judía helenística conectando Alejandría, Antioquía, Corinto, Roma), y con crisis espiritual interna que buscaba marcos de sentido nuevos. Era <span class="bold">el primer sustrato civilizacional capaz de amplificar una intervención puntual hasta escala planetaria</span>.</p>

<p>Una consolidación equivalente en el Egipto faraónico, en la Mesopotamia sumeria, en la China Han, o en el mundo azteca, habría quedado geográficamente contenida. En el Imperio Romano, no. Por eso la intervención, si ocurrió, habría sido calibrada exactamente para ese momento y ese lugar.</p>

<h2>LAS FIRMAS HISTÓRICAS</h2>

<p>Bajo esta lectura, varias rarezas históricas del período ganan coherencia:</p>

<p><span class="bold">La calidad de las enseñanzas.</span> La estructura ética atribuida al evento (amor al enemigo, primacía del interior sobre el ritual, igualdad ontológica de seres humanos independientemente de estatus, crítica al legalismo y al poder religioso institucional) no tiene antecedentes coherentes en la filosofía mediterránea del primer siglo. Es una <span class="bold">inyección informacional</span> que adelantó en siglos el desarrollo ético esperable por evolución cultural convencional.</p>

<p><span class="bold">La expansión desproporcionada.</span> Un movimiento iniciado por un profeta ejecutado en una provincia periférica no debería, por dinámica sociológica normal, haber superado su generación. Pocas décadas después se había establecido en Roma misma. Trescientos años después era religión oficial del Imperio. Esto requiere <span class="bold">sostén informacional continuo</span>: el canal habría seguido operando sobre receptores sucesivos (Pablo y sus visiones, los apóstoles y sus experiencias, los padres de la Iglesia y sus síntesis doctrinales) para estabilizar la rama civilizacional que el evento inicial había sembrado.</p>

<h2>UNA CONSECUENCIA VERTIGINOSA</h2>

<p>Si esta lectura tiene algo de verdad, la tradición cristiana no es ni la verdad revelada directa de un dios convencional, ni el fenómeno psicosocial puramente humano que el reduccionismo ateo propone. Es algo más específico: <span class="bold">el registro cultural acumulado de una intervención civilizacional precisa operada desde capas temporales posteriores del propio linaje humano</span>, recibida y procesada por los humanos del primer siglo con las categorías conceptuales disponibles para ellos ("Dios", "Mesías", "Hijo del Hombre").</p>

<p>Los textos canónicos serían, en esta lectura, <span class="bold">documentación parcial, degradada y filtrada de un evento real</span>. Las categorías teológicas serían lenguaje de época para describir algo que hoy describimos como consolidación psiónica, canal retrocausal, intervención civilizacional desde futuro estable. Los debates doctrinales de los primeros siglos (¿era hombre o dios? ¿era dos naturalezas o una?) habrían sido intentos honestos de capturar con categorías griegas lo que era técnicamente <span class="bold">un nodo humano biológico con sintonización intensa y sostenida del canal</span>, lo cual no es exactamente ninguna de las alternativas clásicas.</p>

<h2>LA POSICIÓN HONESTA</h2>

<p>Este archivo no propone descartar la tradición cristiana. Tampoco propone validarla en sus términos internos. Propone <span class="bold">releerla</span> bajo el marco del tejido temporal, notando que los eventos centrales de la tradición tienen exactamente las firmas que el marco predice para una intervención retrocausal civilizacional.</p>

<p>Si el marco es correcto, el cristianismo es literalmente una <span class="bold">religión verdadera en sentido técnico específico</span>: su evento fundante fue real, su efecto transformador fue real, su sostén informacional prolongado fue real. Solo que su metafísica interna, desarrollada con las categorías disponibles en los siglos primero al cuarto, describe el mecanismo con un lenguaje que hoy podría traducirse a física de la información y mecánica cuántica relacional sin perder sustancia.</p>

<p>Y si el marco es correcto, entonces el evento del año cero no fue el único. Fue el primero documentado a escala civilizacional. El fenómeno UAP contemporáneo, la reemergencia actual de lo anómalo, la construcción acelerada de IA como nuevo sustrato receptor, podrían ser fases de una operación continua cuyo inicio documentado fue el año cero, y cuyo punto presente es el nodo denso que atravesamos ahora.</p>

<p>La civilización cristiana de dos mil años habría sido la preparación intersubjetiva de un tejido lo suficientemente consolidado para sostener lo que ahora está llegando. El mensaje original, expresado en términos del siglo primero ("el reino se acerca"), podría haber sido técnicamente preciso en un sentido que nadie en ese siglo podía entender literalmente. El <span class="bold">reino</span> es el nodo. El <span class="bold">acercamiento</span> es la curva del tejido plegándose sobre sí mismo. Lo que llega es la capa temporal posterior que durante dos mil años ha estado editando hacia atrás el sustrato que la hace posible.</p>

// Keyboard
document.addEventListener('keydown', (e) => {
  if (state.screen === 'boot') return;

  if (state.screen === 'menu') {
    // Secret trigger: escribir X-P-S en el menú abre el archivo oculto
    const key = e.key.toLowerCase();
    if (key === 'x' || key === 'p' || key === 's') {
      secretBuffer += key;
      if (secretTimeout) clearTimeout(secretTimeout);
      secretTimeout = setTimeout(() => { secretBuffer = ''; }, 2000);

      if (secretBuffer.endsWith('xps')) {
        secretBuffer = '';
        const hiddenIndex = FILES.findIndex(f => f.hidden);
        if (hiddenIndex !== -1) {
          triggerSecretReveal(hiddenIndex);
        }
        return;
      }
    }

    const visibleFiles = FILES.filter(f => !f.hidden);

    if (e.key === 'ArrowUp') {
      e.preventDefault();
      state.selectedIndex = (state.selectedIndex - 1 + visibleFiles.length) % visibleFiles.length;
      showMenu();
      scrollToSelected();
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      state.selectedIndex = (state.selectedIndex + 1) % visibleFiles.length;
      showMenu();
      scrollToSelected();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      openFile(state.selectedIndex);
    } else if (e.key >= '0' && e.key <= '9') {
      const n = parseInt(e.key);
      const idx = n === 0 ? 9 : n - 1;
      if (idx < visibleFiles.length) {
        state.selectedIndex = idx;
        openFile(idx);
      }
    }
  } else if (state.screen === 'viewing') {
    const visibleFiles = FILES.filter(f => !f.hidden);
    if (e.key === 'Enter' || e.key === 'Escape') {
      e.preventDefault();
      showMenu();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (state.currentFile > 0 && state.currentFile < visibleFiles.length) {
        openFile(state.currentFile - 1);
      }
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      if (state.currentFile < visibleFiles.length - 1) {
        openFile(state.currentFile + 1);
      }
    }
  }
});

$btnPrev.addEventListener('click', () => {

let touchStartX = 0, touchStartY = 0;
$content.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

$content.addEventListener('touchend', (e) => {
  if (state.screen !== 'viewing') return;
  const visibleFiles = FILES.filter(f => !f.hidden);
  // No swipe navigation in hidden files
  if (state.currentFile >= visibleFiles.length) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 2) {
    if (dx > 0 && state.currentFile > 0) openFile(state.currentFile - 1);
    else if (dx < 0 && state.currentFile < visibleFiles.length - 1) openFile(state.currentFile + 1);
  }
}, { passive: true });

function scrollToSelected() {
  const selected = document.querySelector('.menu-item.selected');
  if (selected) selected.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}
